<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customers - Admin | Batangas Premium Naga</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://kit.fontawesome.com/2771f4216a.js" crossorigin="anonymous"></script>
  <style>
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;}
    .modal-box{background:white;border-radius:var(--radius-lg);padding:32px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
    .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#dc2626,#f97316);display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:700;flex-shrink:0;}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-header">
      <a href="../index.html" class="logo" style="text-decoration:none;">
        <div class="logo-icon"><i class="fas fa-utensils"></i></div>
        <div>
          <div class="logo-text" style="color:white;">Batangas Premium Naga</div>
          <div class="logo-subtext" style="color:rgba(255,255,255,0.7);">Noona's Food Station</div>
        </div>
      </a>
    </div>
    <nav class="admin-sidebar-nav">
      <a href="dashboard.html"  class="admin-nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
      <a href="orders.html"     class="admin-nav-item"><i class="fas fa-list-check"></i> Orders</a>
      <a href="products.html"   class="admin-nav-item"><i class="fas fa-box"></i> Products</a>
      <a href="categories.html" class="admin-nav-item"><i class="fas fa-tags"></i> Categories</a>
      <a href="customers.html"  class="admin-nav-item active"><i class="fas fa-users"></i> Customers</a>
      <a href="reports.html"    class="admin-nav-item"><i class="fas fa-chart-bar"></i> Reports</a>
      <a href="../index.html"   class="admin-nav-item" style="margin-top:auto;"><i class="fas fa-arrow-left"></i> Back to Site</a>
      <button onclick="Auth.logout()" class="admin-nav-item" style="background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;width:100%;text-align:left;">
        <i class="fas fa-sign-out-alt"></i> Sign Out
      </button>
    </nav>
  </aside>

  <main class="admin-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px;">
      <div>
        <h1 style="font-size:1.75rem;font-weight:700;margin-bottom:4px;">Customers</h1>
        <p style="color:var(--gray-500);font-size:14px;" id="cust-count">Loading...</p>
      </div>
    </div>

    <div class="stats-grid" style="grid-template-columns:repeat(3,1fr);margin-bottom:24px;">
      <div class="stats-card"><div class="stats-header"><div><div class="stats-value" id="stat-total" style="font-size:1.5rem;">0</div><div class="stats-label">Total Customers</div></div><div class="stats-icon blue"><i class="fas fa-users"></i></div></div></div>
      <div class="stats-card"><div class="stats-header"><div><div class="stats-value" id="stat-new" style="font-size:1.5rem;">0</div><div class="stats-label">New This Month</div></div><div class="stats-icon green"><i class="fas fa-user-plus"></i></div></div></div>
      <div class="stats-card"><div class="stats-header"><div><div class="stats-value" id="stat-ordered" style="font-size:1.5rem;">0</div><div class="stats-label">With Orders</div></div><div class="stats-icon orange"><i class="fas fa-bag-shopping"></i></div></div></div>
    </div>

    <div style="margin-bottom:16px;">
      <input id="search-input" type="text" placeholder="Search by name, email or phone..." class="form-input" style="max-width:360px;" oninput="filterCustomers()">
    </div>

    <div class="table-container">
      <div id="loading" style="text-align:center;padding:48px;color:var(--gray-500);">
        <div style="width:32px;height:32px;border:3px solid #dc2626;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;"></div>
        Loading customers...
      </div>
      <table class="table" id="cust-table" style="display:none;">
        <thead>
          <tr><th>Customer</th><th>Email</th><th>Phone</th><th>Registered</th><th>Orders</th><th>Actions</th></tr>
        </thead>
        <tbody id="cust-tbody"></tbody>
      </table>
      <div id="no-results" style="display:none;text-align:center;padding:48px;color:var(--gray-500);">No customers found.</div>
    </div>
  </main>
</div>

<!-- View modal -->
<div id="view-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:24px;">
      <h2 style="font-size:1.1rem;font-weight:700;margin:0;">Customer Details</h2>
      <button onclick="document.getElementById('view-modal').style.display='none'" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-400);">✕</button>
    </div>
    <div id="view-content"></div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/app.js"></script>
<script>
let allCustomers=[], allOrders=[];

async function loadAll() {
  try {
    const [customers, orders] = await Promise.all([api.getCustomers(), api.getAllOrders()]);
    allCustomers=customers; allOrders=orders;
    const now=new Date();
    const thisMonth=customers.filter(c=>{const d=new Date(c.CREATED_AT||c.created_at);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;
    const withOrders=new Set(orders.map(o=>o.USER_ID||o.user_id).filter(Boolean)).size;
    document.getElementById('stat-total').textContent   = customers.length;
    document.getElementById('stat-new').textContent     = thisMonth;
    document.getElementById('stat-ordered').textContent = withOrders;
    document.getElementById('cust-count').textContent   = `${customers.length} registered customer${customers.length!==1?'s':''}`;
    document.getElementById('loading').style.display    = 'none';
    renderTable(customers);
  } catch { document.getElementById('loading').textContent='Failed to load.'; }
}

function renderTable(customers) {
  const table=document.getElementById('cust-table'), tbody=document.getElementById('cust-tbody'), noRes=document.getElementById('no-results');
  if(!customers.length){table.style.display='none';noRes.style.display='block';return;}
  noRes.style.display='none'; table.style.display='table';
  tbody.innerHTML=customers.map(c=>{
    const id=c.USER_ID||c.user_id, name=c.FULL_NAME||c.full_name||'—', email=c.EMAIL||c.email||'—', phone=c.PHONE||c.phone||'—';
    const date=new Date(c.CREATED_AT||c.created_at).toLocaleDateString('en-PH',{year:'numeric',month:'short',day:'numeric'});
    const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
    const orderCount=allOrders.filter(o=>(o.USER_ID||o.user_id)===id).length;
    return `<tr>
      <td><div style="display:flex;align-items:center;gap:10px;"><div class="avatar">${initials}</div><span style="font-weight:600;">${name}</span></div></td>
      <td style="color:var(--gray-600);font-size:13px;">${email}</td>
      <td style="font-size:13px;">${phone}</td>
      <td style="font-size:13px;color:var(--gray-500);">${date}</td>
      <td><span class="badge badge-info">${orderCount} order${orderCount!==1?'s':''}</span></td>
      <td><button class="btn btn-outline btn-sm" onclick="viewCustomer(${id})"><i class="fas fa-eye" style="margin-right:4px;"></i>View</button></td>
    </tr>`;
  }).join('');
}

function filterCustomers() {
  const q=document.getElementById('search-input').value.toLowerCase();
  renderTable(allCustomers.filter(c=>(c.FULL_NAME||c.full_name||'').toLowerCase().includes(q)||(c.EMAIL||c.email||'').toLowerCase().includes(q)||(c.PHONE||c.phone||'').toLowerCase().includes(q)));
}

function viewCustomer(id) {
  const c=allCustomers.find(x=>(x.USER_ID||x.user_id)===id); if(!c) return;
  const orders=allOrders.filter(o=>(o.USER_ID||o.user_id)===id);
  const name=c.FULL_NAME||c.full_name||'—', email=c.EMAIL||c.email||'—', phone=c.PHONE||c.phone||'—';
  const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
  const totalSpent=orders.filter(o=>(o.STATUS||o.status)!=='Cancelled').reduce((s,o)=>s+parseFloat(o.TOTAL||o.total||0),0);
  const statusColors={Pending:'badge-warning',Confirmed:'badge-info',Preparing:'badge-info',Ready:'badge-success',Delivered:'badge-success',Cancelled:'badge-danger'};

  document.getElementById('view-content').innerHTML=`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:24px;padding-bottom:20px;border-bottom:1px solid var(--gray-200);">
      <div class="avatar" style="width:56px;height:56px;font-size:18px;">${initials}</div>
      <div>
        <p style="font-size:1.125rem;font-weight:700;">${name}</p>
        <p style="color:var(--gray-500);font-size:13px;">${email}</p>
        <p style="color:var(--gray-500);font-size:13px;">${phone}</p>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px;">
      <div style="background:var(--gray-50);border-radius:8px;padding:14px;"><p style="font-size:12px;color:var(--gray-500);margin-bottom:4px;">Total Orders</p><p style="font-size:1.5rem;font-weight:700;">${orders.length}</p></div>
      <div style="background:var(--gray-50);border-radius:8px;padding:14px;"><p style="font-size:12px;color:var(--gray-500);margin-bottom:4px;">Total Spent</p><p style="font-size:1.5rem;font-weight:700;color:#dc2626;">₱${totalSpent.toFixed(2)}</p></div>
    </div>
    ${orders.length?`
    <h3 style="font-size:15px;margin-bottom:12px;">Order History</h3>
    <div style="display:flex;flex-direction:column;gap:8px;max-height:240px;overflow-y:auto;">
      ${orders.map(o=>{const oid=o.ORDER_ID||o.order_id,status=o.STATUS||o.status;return`<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--gray-50);border-radius:8px;font-size:13px;">
        <div><span style="font-weight:600;">ORD-${String(oid).padStart(4,'0')}</span><span style="color:var(--gray-500);margin-left:8px;">${new Date(o.CREATED_AT||o.created_at).toLocaleDateString('en-PH',{month:'short',day:'numeric',year:'numeric'})}</span></div>
        <div style="display:flex;align-items:center;gap:8px;"><span class="badge ${statusColors[status]||'badge-info'}">${status}</span><span style="font-weight:700;color:#dc2626;">₱${parseFloat(o.TOTAL||o.total||0).toFixed(2)}</span></div>
      </div>`;}).join('')}
    </div>`:'<p style="color:var(--gray-500);font-size:13px;">No orders yet.</p>'}`;

  document.getElementById('view-modal').style.display='flex';
}

document.addEventListener('DOMContentLoaded', ()=>{
  const user=JSON.parse(localStorage.getItem('currentUser')||'null');
  if(!user||(user.ROLE!=='admin'&&user.role!=='admin')){window.location.href='../login.html';return;}
  loadAll();
});
</script>
</body>
</html>
