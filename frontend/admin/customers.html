<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Customers - Admin | Batangas Premium Naga</title>
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <script src="https://kit.fontawesome.com/2771f4216a.js" crossorigin="anonymous"></script>
  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:13000;display:flex;align-items:flex-end;justify-content:center;padding:0;}
    .modal-box{background:white;border-radius:20px 20px 0 0;padding:24px 20px;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;}
    .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#dc2626,#f97316);display:flex;align-items:center;justify-content:center;color:white;font-size:13px;font-weight:700;flex-shrink:0;}
    .avatar.adm{background:linear-gradient(135deg,#1d4ed8,#7c3aed);}
    .badge-blocked{background:#fee2e2;color:#dc2626;border:1px solid #fca5a5;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;display:inline-block;}
    .badge-active{background:#dcfce7;color:#16a34a;border:1px solid #86efac;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;display:inline-block;}
    .badge-adm{background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe;padding:3px 10px;border-radius:999px;font-size:12px;font-weight:600;display:inline-block;}
    /* Mobile customer cards */
    .cust-card{background:white;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.07);padding:14px;margin-bottom:10px;}
    .cust-card-row{display:flex;align-items:center;gap:12px;}
    .cust-card-body{flex:1;min-width:0;}
    .cust-card-actions{display:flex;gap:8px;margin-top:10px;}
  </style>
</head>
<body>

<div class="admin-topbar"><span class="admin-topbar-title">Customers</span></div>
<button class="sb-toggle" onclick="sbOpen()"><i class="fas fa-bars"></i></button>
<div class="sb-backdrop" id="sbBackdrop" onclick="sbClose()"></div>

<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-sidebar-header">
      <a href="../index.html" class="logo" style="text-decoration:none;">
        <div class="logo-icon"><i class="fas fa-utensils"></i></div>
        <div>
          <div class="logo-text" style="color:white;font-size:13px;">Batangas Premium Naga</div>
          <div class="logo-subtext" style="color:rgba(255,255,255,.7);">Admin Panel</div>
        </div>
      </a>
    </div>
    <nav class="admin-sidebar-nav">
      <a href="dashboard.html"  class="admin-nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
      <a href="orders.html"     class="admin-nav-item"><i class="fas fa-list-check"></i> Orders</a>
      <a href="products.html"   class="admin-nav-item"><i class="fas fa-box"></i> Products</a>
      <a href="categories.html" class="admin-nav-item"><i class="fas fa-tags"></i> Categories</a>
      <a href="customers.html"  class="admin-nav-item active"><i class="fas fa-users"></i> Customers</a>
      <a href="reports.html"    class="admin-nav-item"><i class="fas fa-chart-bar"></i> Reports</a>
      <a href="../index.html"   class="admin-nav-item" style="margin-top:auto;"><i class="fas fa-arrow-left"></i> Back to Site</a>
      <button onclick="Auth.logout()" class="admin-nav-item" style="background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;width:100%;text-align:left;font-size:inherit;"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    </nav>
  </aside>

  <main class="admin-content">
    <div class="admin-header-row" style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px;">
      <div>
        <h1 style="font-size:1.6rem;font-weight:700;margin-bottom:2px;">Customers</h1>
        <p style="color:var(--gray-500);font-size:13px;" id="cust-count">Loading...</p>
      </div>
      <button onclick="openAddModal()" class="btn btn-primary"><i class="fas fa-user-plus" style="margin-right:6px;"></i>Add Customer</button>
    </div>

    <!-- Stats -->
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px;">
      <div class="stats-card"><div class="stats-header"><div><div class="stats-value" id="s-total" style="font-size:1.3rem;">0</div><div class="stats-label" style="font-size:11px;">Total</div></div><div class="stats-icon blue" style="width:36px;height:36px;font-size:14px;"><i class="fas fa-users"></i></div></div></div>
      <div class="stats-card"><div class="stats-header"><div><div class="stats-value" id="s-new" style="font-size:1.3rem;">0</div><div class="stats-label" style="font-size:11px;">This Month</div></div><div class="stats-icon green" style="width:36px;height:36px;font-size:14px;"><i class="fas fa-user-plus"></i></div></div></div>
      <div class="stats-card"><div class="stats-header"><div><div class="stats-value" id="s-ord" style="font-size:1.3rem;">0</div><div class="stats-label" style="font-size:11px;">With Orders</div></div><div class="stats-icon orange" style="width:36px;height:36px;font-size:14px;"><i class="fas fa-bag-shopping"></i></div></div></div>
      <div class="stats-card"><div class="stats-header"><div><div class="stats-value" id="s-blk" style="font-size:1.3rem;">0</div><div class="stats-label" style="font-size:11px;">Blocked</div></div><div class="stats-icon red" style="width:36px;height:36px;font-size:14px;"><i class="fas fa-ban"></i></div></div></div>
    </div>

    <!-- Filters -->
    <div class="filter-row" style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      <input id="search-input" type="text" placeholder="Search name, email, phone..." class="form-input" style="flex:1;min-width:140px;" oninput="filterCustomers()">
      <select id="status-filter" class="form-select" style="max-width:130px;" onchange="filterCustomers()"><option value="">All Status</option><option value="active">Active</option><option value="blocked">Blocked</option></select>
      <select id="role-filter" class="form-select" style="max-width:120px;" onchange="filterCustomers()"><option value="">All Roles</option><option value="customer">Customers</option><option value="admin">Admins</option></select>
    </div>

    <div id="loading" style="text-align:center;padding:48px;color:#9ca3af;">
      <div style="width:26px;height:26px;border:3px solid #dc2626;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;"></div>
      Loading customers...
    </div>

    <!-- Desktop table -->
    <div class="table-container" id="table-wrap" style="display:none;">
      <table class="table" style="min-width:520px;">
        <thead><tr><th>Customer</th><th>Contact</th><th>Role</th><th>Status</th><th>Orders</th><th>Actions</th></tr></thead>
        <tbody id="cust-tbody"></tbody>
      </table>
    </div>

    <!-- Mobile cards -->
    <div id="mobile-cards" style="display:none;"></div>
    <div id="no-results" style="display:none;text-align:center;padding:48px;color:#9ca3af;">No customers found.</div>
  </main>
</div>

<!-- View modal -->
<div id="view-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeViewModal()">
  <div class="modal-box">
    <div style="width:40px;height:4px;background:#e5e7eb;border-radius:2px;margin:0 auto 16px;"></div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
      <h2 style="font-size:1.1rem;font-weight:700;margin:0;">Customer Details</h2>
      <button onclick="closeViewModal()" style="background:none;border:none;font-size:22px;cursor:pointer;color:#9ca3af;line-height:1;">✕</button>
    </div>
    <div id="view-content"></div>
  </div>
</div>

<!-- Add modal -->
<div id="add-modal" class="modal-overlay" style="display:none;" onclick="if(event.target===this)closeAddModal()">
  <div class="modal-box" style="max-width:460px;">
    <div style="width:40px;height:4px;background:#e5e7eb;border-radius:2px;margin:0 auto 16px;"></div>
    <h2 style="font-size:1.1rem;font-weight:700;margin-bottom:18px;">Add New User</h2>
    <form id="add-form">
      <div class="form-group"><label class="form-label">Full Name *</label><input type="text" id="a-name" class="form-input" required placeholder="Juan dela Cruz"></div>
      <div class="form-group"><label class="form-label">Email *</label><input type="email" id="a-email" class="form-input" required placeholder="user@email.com"></div>
      <div class="form-group"><label class="form-label">Phone</label><input type="tel" id="a-phone" class="form-input" placeholder="+63 9XX XXX XXXX"></div>
      <div class="form-group">
        <label class="form-label">Password *</label>
        <div style="position:relative;">
          <input type="password" id="a-pass" class="form-input" required placeholder="Min. 6 characters" style="padding-right:48px;">
          <button type="button" onclick="togglePw('a-pass','a-eye')" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#9ca3af;font-size:16px;"><i id="a-eye" class="fa-regular fa-eye"></i></button>
        </div>
      </div>
      <div class="form-group"><label class="form-label">Role</label><select id="a-role" class="form-select"><option value="customer">Customer</option><option value="admin">Admin</option></select></div>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button type="submit" id="add-btn" class="btn btn-primary" style="flex:1;"><i class="fas fa-user-plus" style="margin-right:6px;"></i>Add User</button>
        <button type="button" onclick="closeAddModal()" class="btn btn-outline" style="flex:1;">Cancel</button>
      </div>
    </form>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/app.js"></script>
<script>
function sbOpen(){ document.getElementById('adminSidebar').classList.add('sb-open'); document.getElementById('sbBackdrop').classList.add('on'); }
function sbClose(){ document.getElementById('adminSidebar').classList.remove('sb-open'); document.getElementById('sbBackdrop').classList.remove('on'); }
function togglePw(id,iconId){const el=document.getElementById(id),ic=document.getElementById(iconId);el.type=el.type==='password'?'text':'password';ic.className=el.type==='text'?'fa-regular fa-eye-slash':'fa-regular fa-eye';}

let allCustomers=[], allOrders=[];
const isMobile = () => window.innerWidth <= 768;

async function loadAll(){
  try{
    const [customers,orders]=await Promise.all([api.getAllUsers(),api.getAllOrders()]);
    allCustomers=customers; allOrders=orders;
    const now=new Date();
    const thisMonth=customers.filter(c=>{const d=new Date(c.CREATED_AT||c.created_at);return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).length;
    const withOrders=new Set(orders.map(o=>o.USER_ID||o.user_id).filter(Boolean)).size;
    const blocked=customers.filter(c=>(c.STATUS||c.status||'active')==='blocked').length;
    document.getElementById('s-total').textContent=customers.length;
    document.getElementById('s-new').textContent=thisMonth;
    document.getElementById('s-ord').textContent=withOrders;
    document.getElementById('s-blk').textContent=blocked;
    document.getElementById('cust-count').textContent=customers.length+' registered users';
    document.getElementById('loading').style.display='none';
    filterCustomers();
  }catch(e){document.getElementById('loading').textContent='Failed to load. Is the server running?';}
}

function filterCustomers(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const st=document.getElementById('status-filter').value;
  const role=document.getElementById('role-filter').value;
  const filtered=allCustomers.filter(c=>{
    const matchQ=!q||(c.FULL_NAME||c.full_name||'').toLowerCase().includes(q)||(c.EMAIL||c.email||'').toLowerCase().includes(q)||(c.PHONE||c.phone||'').toLowerCase().includes(q);
    const matchSt=!st||(c.STATUS||c.status||'active').toLowerCase()===st;
    const matchRole=!role||(c.ROLE||c.role||'customer').toLowerCase()===role;
    return matchQ&&matchSt&&matchRole;
  });
  if(isMobile()) renderCards(filtered); else renderTable(filtered);
}

window.addEventListener('resize',()=>filterCustomers());

function renderTable(customers){
  document.getElementById('mobile-cards').style.display='none';
  const wrap=document.getElementById('table-wrap'),tbody=document.getElementById('cust-tbody'),noRes=document.getElementById('no-results');
  if(!customers.length){wrap.style.display='none';noRes.style.display='block';return;}
  noRes.style.display='none';wrap.style.display='block';
  tbody.innerHTML=customers.map(c=>{
    const id=c.USER_ID||c.user_id, name=c.FULL_NAME||c.full_name||'—', email=c.EMAIL||c.email||'—', phone=c.PHONE||c.phone||'—';
    const role=(c.ROLE||c.role||'customer').toLowerCase(), status=(c.STATUS||c.status||'active').toLowerCase();
    const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';
    const orderCount=allOrders.filter(o=>(o.USER_ID||o.user_id)===id).length;
    const isBlocked=status==='blocked', isAdmin=role==='admin';
    return `<tr style="${isBlocked?'opacity:.65;':''}">
      <td><div style="display:flex;align-items:center;gap:10px;"><div class="avatar ${isAdmin?'adm':''}">${initials}</div><div><div style="font-weight:600;font-size:13px;">${name}</div><div style="font-size:11px;color:#9ca3af;">${email}</div></div></div></td>
      <td style="font-size:13px;color:#6b7280;">${phone}</td>
      <td>${isAdmin?'<span class="badge-adm">Admin</span>':'<span style="font-size:12px;color:#6b7280;">Customer</span>'}</td>
      <td><span class="${isBlocked?'badge-blocked':'badge-active'}">${isBlocked?'Blocked':'Active'}</span></td>
      <td><span class="badge badge-info" style="font-size:11px;">${orderCount}</span></td>
      <td><div style="display:flex;gap:6px;">
        <button style="width:30px;height:30px;border-radius:8px;border:1px solid #bfdbfe;background:white;color:#2563eb;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;" onclick="viewCustomer(${id})" title="View"><i class="fas fa-eye"></i></button>
        ${!isAdmin?`<button style="width:30px;height:30px;border-radius:8px;border:1px solid ${isBlocked?'#86efac':'#fca5a5'};background:white;color:${isBlocked?'#16a34a':'#dc2626'};cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;" onclick="toggleBlock(${id},'${status}')" title="${isBlocked?'Unblock':'Block'}"><i class="fas ${isBlocked?'fa-unlock':'fa-ban'}"></i></button>`:''}
      </div></td>
    </tr>`;
  }).join('');
}

function renderCards(customers){
  document.getElementById('table-wrap').style.display='none';
  const cards=document.getElementById('mobile-cards'),noRes=document.getElementById('no-results');
  if(!customers.length){cards.style.display='none';noRes.style.display='block';return;}
  noRes.style.display='none';cards.style.display='block';
  cards.innerHTML=customers.map(c=>{
    const id=c.USER_ID||c.user_id, name=c.FULL_NAME||c.full_name||'—', email=c.EMAIL||c.email||'—', phone=c.PHONE||c.phone||'—';
    const role=(c.ROLE||c.role||'customer').toLowerCase(), status=(c.STATUS||c.status||'active').toLowerCase();
    const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';
    const orderCount=allOrders.filter(o=>(o.USER_ID||o.user_id)===id).length;
    const isBlocked=status==='blocked', isAdmin=role==='admin';
    return `<div class="cust-card" style="${isBlocked?'opacity:.65;':''}">
      <div class="cust-card-row">
        <div class="avatar ${isAdmin?'adm':''}" style="width:44px;height:44px;font-size:15px;">${initials}</div>
        <div class="cust-card-body">
          <div style="font-weight:700;font-size:14px;">${name}</div>
          <div style="font-size:12px;color:#9ca3af;">${email}</div>
          <div style="font-size:12px;color:#9ca3af;">${phone}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;">
          ${isAdmin?'<span class="badge-adm">Admin</span>':''}
          <span class="${isBlocked?'badge-blocked':'badge-active'}">${isBlocked?'Blocked':'Active'}</span>
          <span style="font-size:11px;color:#9ca3af;">${orderCount} order${orderCount!==1?'s':''}</span>
        </div>
      </div>
      <div class="cust-card-actions">
        <button onclick="viewCustomer(${id})" class="btn btn-outline btn-sm" style="flex:1;font-size:13px;"><i class="fas fa-eye" style="margin-right:5px;"></i>View</button>
        ${!isAdmin?`<button onclick="toggleBlock(${id},'${status}')" class="btn btn-sm" style="flex:1;font-size:13px;background:${isBlocked?'#dcfce7':'#fee2e2'};color:${isBlocked?'#16a34a':'#dc2626'};border:1px solid ${isBlocked?'#86efac':'#fca5a5'};"><i class="fas ${isBlocked?'fa-unlock':'fa-ban'}" style="margin-right:5px;"></i>${isBlocked?'Unblock':'Block'}</button>`:''}
      </div>
    </div>`;
  }).join('');
}

async function toggleBlock(id,currentStatus){
  const isBlocked=currentStatus==='blocked';
  if(!confirm(`${isBlocked?'Unblock':'Block'} this customer?`))return;
  try{
    const res=await fetch(`http://localhost:3000/api/admin/customers/${id}/status`,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({status:isBlocked?'active':'blocked'})}).then(r=>r.json());
    if(res.success){Utils.showToast(`Customer ${isBlocked?'unblocked':'blocked'}`,'success');await loadAll();}
    else{Utils.showToast(res.message||'Failed','error');}
  }catch{Utils.showToast('Server error','error');}
}

function viewCustomer(id){
  const c=allCustomers.find(x=>(x.USER_ID||x.user_id)===id);if(!c)return;
  const orders=allOrders.filter(o=>(o.USER_ID||o.user_id)===id);
  const name=c.FULL_NAME||c.full_name||'—', email=c.EMAIL||c.email||'—', phone=c.PHONE||c.phone||'—';
  const role=(c.ROLE||c.role||'customer').toLowerCase(), status=(c.STATUS||c.status||'active').toLowerCase();
  const initials=name.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2)||'?';
  const totalSpent=orders.filter(o=>(o.STATUS||o.status)!=='Cancelled').reduce((s,o)=>s+parseFloat(o.TOTAL||o.total||0),0);
  document.getElementById('view-content').innerHTML=`
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid #f3f4f6;">
      <div class="avatar ${role==='admin'?'adm':''}" style="width:52px;height:52px;font-size:17px;">${initials}</div>
      <div style="flex:1;">
        <p style="font-weight:700;font-size:15px;margin-bottom:2px;">${name}</p>
        <p style="color:#6b7280;font-size:13px;">${email}</p>
        <p style="color:#6b7280;font-size:13px;">${phone}</p>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px;align-items:flex-end;">
        ${role==='admin'?'<span class="badge-adm">Admin</span>':''}
        <span class="${status==='blocked'?'badge-blocked':'badge-active'}">${status==='blocked'?'Blocked':'Active'}</span>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;">
      <div style="background:#f9fafb;border-radius:10px;padding:12px;"><p style="font-size:11px;color:#9ca3af;margin-bottom:3px;">Total Orders</p><p style="font-size:1.4rem;font-weight:700;">${orders.length}</p></div>
      <div style="background:#f9fafb;border-radius:10px;padding:12px;"><p style="font-size:11px;color:#9ca3af;margin-bottom:3px;">Total Spent</p><p style="font-size:1.4rem;font-weight:700;color:#dc2626;">₱${totalSpent.toFixed(2)}</p></div>
    </div>
    ${orders.length?`<p style="font-size:12px;font-weight:600;color:#374151;margin-bottom:8px;">Order History</p>
    <div style="max-height:200px;overflow-y:auto;display:flex;flex-direction:column;gap:6px;">
      ${orders.map(o=>{const oid=o.ORDER_ID||o.order_id,ost=o.STATUS||o.status;return`<div style="display:flex;justify-content:space-between;align-items:center;padding:8px 12px;background:#f9fafb;border-radius:8px;font-size:13px;">
        <span style="font-weight:600;">ORD-${String(oid).padStart(4,'0')}</span>
        <div style="display:flex;align-items:center;gap:6px;">
          <span style="font-size:11px;color:#9ca3af;">${ost}</span>
          <span style="font-weight:700;color:#dc2626;">₱${parseFloat(o.TOTAL||o.total||0).toFixed(2)}</span>
        </div>
      </div>`;}).join('')}
    </div>`:'<p style="color:#9ca3af;font-size:13px;">No orders yet.</p>'}
    ${role!=='admin'?`<button onclick="toggleBlock(${id},'${status}');closeViewModal();" class="btn ${status==='blocked'?'btn-primary':'btn-primary'}" style="${status!=='blocked'?'background:#dc2626;':'background:#16a34a;'}width:100%;margin-top:16px;"><i class="fas ${status==='blocked'?'fa-unlock':'fa-ban'}" style="margin-right:8px;"></i>${status==='blocked'?'Unblock Customer':'Block Customer'}</button>`:''}`;
  document.getElementById('view-modal').style.display='flex';
}
function closeViewModal(){document.getElementById('view-modal').style.display='none';}

function openAddModal(){document.getElementById('add-modal').style.display='flex';}
function closeAddModal(){document.getElementById('add-modal').style.display='none';document.getElementById('add-form').reset();}

document.getElementById('add-form').addEventListener('submit',async(e)=>{
  e.preventDefault();
  const btn=document.getElementById('add-btn');
  btn.innerHTML='<i class="fas fa-spinner fa-spin" style="margin-right:6px;"></i>Adding...';btn.disabled=true;
  const pass=document.getElementById('a-pass').value;
  if(pass.length<6){Utils.showToast('Password must be at least 6 characters','error');btn.innerHTML='<i class="fas fa-user-plus" style="margin-right:6px;"></i>Add User';btn.disabled=false;return;}
  try{
    const res=await fetch('http://localhost:3000/api/auth/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({full_name:document.getElementById('a-name').value,email:document.getElementById('a-email').value,phone:document.getElementById('a-phone').value,password:pass,role:document.getElementById('a-role').value})}).then(r=>r.json());
    if(res.success){closeAddModal();await loadAll();Utils.showToast('User added!','success');}
    else{Utils.showToast(res.message||'Failed','error');}
  }catch{Utils.showToast('Server error','error');}
  btn.innerHTML='<i class="fas fa-user-plus" style="margin-right:6px;"></i>Add User';btn.disabled=false;
});

document.addEventListener('DOMContentLoaded',()=>{
  const user=JSON.parse(localStorage.getItem('currentUser')||'null');
