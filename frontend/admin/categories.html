<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories - Admin | Batangas Premium Naga</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://kit.fontawesome.com/2771f4216a.js" crossorigin="anonymous"></script>
  <style>
    .sidebar-toggle{display:none;position:fixed;top:12px;left:12px;z-index:11000;width:44px;height:44px;border-radius:10px;background:#dc2626;border:none;color:white;font-size:18px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.2);}
    .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9998;}
    .sidebar-backdrop.active{display:block;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;}
    .modal-box{background:white;border-radius:var(--radius-lg);padding:28px;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:768px){
      .sidebar-toggle{display:flex;}
      .admin-layout{display:block!important;}
      .admin-sidebar{position:fixed!important;left:-280px;top:0;height:100vh;z-index:9999;transition:left .25s ease;width:260px!important;overflow-y:auto;}
      .admin-sidebar.open{left:0;}
      .admin-content{padding:70px 14px 24px!important;}
      .table-container{overflow-x:auto;}
      .modal-overlay{align-items:flex-end!important;padding:0!important;}
      .modal-box{border-radius:16px 16px 0 0!important;max-width:100%!important;}
      h1{font-size:1.3rem!important;}
    }
  </style>
</head>
<body>
<button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-sidebar-header">
      <a href="../index.html" class="logo" style="text-decoration:none;">
        <div class="logo-icon"><i class="fas fa-utensils"></i></div>
        <div>
          <div class="logo-text" style="color:white;">Batangas Premium Naga</div>
          <div class="logo-subtext" style="color:rgba(255,255,255,.7);">Admin Panel</div>
        </div>
      </a>
    </div>
    <nav class="admin-sidebar-nav">
      <a href="dashboard.html"  class="admin-nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
      <a href="orders.html"     class="admin-nav-item"><i class="fas fa-list-check"></i> Orders</a>
      <a href="products.html"   class="admin-nav-item"><i class="fas fa-box"></i> Products</a>
      <a href="categories.html" class="admin-nav-item active"><i class="fas fa-tags"></i> Categories</a>
      <a href="customers.html"  class="admin-nav-item"><i class="fas fa-users"></i> Customers</a>
      <a href="reports.html"    class="admin-nav-item"><i class="fas fa-chart-bar"></i> Reports</a>
      <a href="../index.html"   class="admin-nav-item" style="margin-top:auto;"><i class="fas fa-arrow-left"></i> Back to Site</a>
      <button onclick="Auth.logout()" class="admin-nav-item" style="background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;width:100%;text-align:left;"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    </nav>
  </aside>

  <main class="admin-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
      <div>
        <h1 style="font-size:1.75rem;font-weight:700;margin-bottom:4px;">Categories</h1>
        <p style="color:var(--gray-500);font-size:14px;" id="cat-count">Loading...</p>
      </div>
      <button onclick="openModal()" class="btn btn-primary">
        <i class="fas fa-plus" style="margin-right:6px;"></i>Add Category
      </button>
    </div>

    <div style="margin-bottom:16px;">
      <input id="search-input" type="text" placeholder="Search categories..." class="form-input" style="max-width:360px;" oninput="filterCats()">
    </div>

    <div class="table-container">
      <div id="loading" style="text-align:center;padding:48px;color:var(--gray-500);">
        <div style="width:28px;height:28px;border:3px solid #dc2626;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;"></div>
        Loading categories...
      </div>
      <table class="table" id="cats-table" style="display:none;min-width:360px;">
        <thead><tr><th>#</th><th>Name</th><th>Description</th><th>Products</th><th>Actions</th></tr></thead>
        <tbody id="cats-tbody"></tbody>
      </table>
      <div id="no-results" style="display:none;text-align:center;padding:48px;color:var(--gray-400);">No categories found.</div>
    </div>
  </main>
</div>

<!-- Add/Edit Modal -->
<div id="modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h2 id="modal-title" style="font-size:1.1rem;font-weight:700;margin-bottom:20px;">Add Category</h2>
    <form id="cat-form">
      <input type="hidden" id="cat-id">
      <div class="form-group">
        <label class="form-label">Category Name *</label>
        <input type="text" id="c-name" class="form-input" required placeholder="e.g. Frozen Goods">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="c-desc" class="form-textarea" rows="3" placeholder="Optional description"></textarea>
      </div>
      <div style="display:flex;gap:10px;margin-top:16px;">
        <button type="submit" class="btn btn-primary" id="save-btn" style="flex:1;">
          <i class="fas fa-floppy-disk" style="margin-right:6px;"></i>Save
        </button>
        <button type="button" onclick="closeModal()" class="btn btn-outline" style="flex:1;">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete Modal -->
<div id="delete-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box" style="max-width:360px;">
    <h2 style="font-size:1rem;font-weight:700;color:#dc2626;margin-bottom:12px;">Delete Category?</h2>
    <p style="color:var(--gray-600);margin-bottom:20px;">Delete <strong id="delete-name"></strong>? Products in this category will lose their category.</p>
    <div style="display:flex;gap:10px;">
      <button id="confirm-delete-btn" class="btn btn-primary" style="background:#dc2626;flex:1;">Delete</button>
      <button onclick="closeDeleteModal()" class="btn btn-outline" style="flex:1;">Cancel</button>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/app.js"></script>
<script>
function toggleSidebar(){document.getElementById('adminSidebar').classList.toggle('open');document.getElementById('sidebarBackdrop').classList.toggle('active');}
function closeSidebar(){document.getElementById('adminSidebar').classList.remove('open');document.getElementById('sidebarBackdrop').classList.remove('active');}

let allCats=[], allProducts=[], deleteTargetId=null;

async function loadAll(){
  try{
    const [cats,products]=await Promise.all([api.getCategories_admin(),api.getProducts()]);
    allCats=cats; allProducts=products;
    document.getElementById('cat-count').textContent=cats.length+' categories';
    document.getElementById('loading').style.display='none';
    renderTable(cats);
  }catch(e){document.getElementById('loading').innerHTML='<p style="color:#dc2626;padding:20px;">Failed to load. Is the server running?</p>';}
}

function renderTable(cats){
  const table=document.getElementById('cats-table'),tbody=document.getElementById('cats-tbody'),noRes=document.getElementById('no-results');
  if(!cats.length){table.style.display='none';noRes.style.display='block';return;}
  noRes.style.display='none';table.style.display='table';
  tbody.innerHTML=cats.map((c,i)=>{
    const id=c.category_id||c.CATEGORY_ID, name=c.name||c.NAME, desc=c.description||c.DESCRIPTION||'';
    const prodCount=allProducts.filter(p=>p.category===name).length;
    return `<tr>
      <td style="color:var(--gray-400);font-size:13px;">${i+1}</td>
      <td>
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="width:36px;height:36px;border-radius:8px;background:linear-gradient(135deg,#dc2626,#f97316);display:flex;align-items:center;justify-content:center;color:white;font-size:14px;flex-shrink:0;"><i class="fas fa-tag"></i></div>
          <span style="font-weight:600;">${name}</span>
        </div>
      </td>
      <td style="color:var(--gray-500);font-size:13px;">${desc||'—'}</td>
      <td><span class="badge badge-info">${prodCount} item${prodCount!==1?'s':''}</span></td>
      <td>
        <div style="display:flex;gap:6px;">
          <button class="icon-btn edit" onclick="editCat(${id},'${name.replace(/'/g,"\\'")}','${desc.replace(/'/g,"\\'")}')"><i class="fas fa-pen"></i></button>
          <button class="icon-btn delete" onclick="confirmDelete(${id},'${name.replace(/'/g,"\\'")}')"><i class="fas fa-trash"></i></button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function filterCats(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  renderTable(allCats.filter(c=>(c.name||c.NAME||'').toLowerCase().includes(q)||(c.description||c.DESCRIPTION||'').toLowerCase().includes(q)));
}

function openModal(){
  document.getElementById('modal-title').textContent='Add Category';
  document.getElementById('cat-id').value='';
  document.getElementById('c-name').value='';
  document.getElementById('c-desc').value='';
  document.getElementById('modal').style.display='flex';
}

function editCat(id,name,desc){
  document.getElementById('modal-title').textContent='Edit Category';
  document.getElementById('cat-id').value=id;
  document.getElementById('c-name').value=name;
  document.getElementById('c-desc').value=desc;
  document.getElementById('modal').style.display='flex';
}

function closeModal(){document.getElementById('modal').style.display='none';}

document.getElementById('cat-form').addEventListener('submit',async(e)=>{
  e.preventDefault();
  const btn=document.getElementById('save-btn');
  btn.innerHTML='<i class="fas fa-spinner fa-spin" style="margin-right:6px;"></i>Saving...';btn.disabled=true;
  const id=document.getElementById('cat-id').value;
  const data={name:document.getElementById('c-name').value,description:document.getElementById('c-desc').value};
  try{
    const res=id?await api.updateCategory(id,data):await api.addCategory(data);
    if(res.success||res.category_id){closeModal();await loadAll();Utils.showToast(id?'Category updated!':'Category added!','success');}
    else{Utils.showToast(res.message||'Failed','error');}
  }catch{Utils.showToast('Server error','error');}
  btn.innerHTML='<i class="fas fa-floppy-disk" style="margin-right:6px;"></i>Save';btn.disabled=false;
});

function confirmDelete(id,name){deleteTargetId=id;document.getElementById('delete-name').textContent=name;document.getElementById('delete-modal').style.display='flex';}
function closeDeleteModal(){document.getElementById('delete-modal').style.display='none';deleteTargetId=null;}
document.getElementById('confirm-delete-btn').addEventListener('click',async()=>{
  if(!deleteTargetId)return;
  try{await api.deleteCategory(deleteTargetId);closeDeleteModal();await loadAll();Utils.showToast('Category deleted','info');}
  catch{Utils.showToast('Failed to delete','error');}
});

document.addEventListener('DOMContentLoaded',()=>{
  const user=JSON.parse(localStorage.getItem('currentUser')||'null');
  if(!user||(user.ROLE!=='admin'&&user.role!=='admin')){window.location.href='../login.html';return;}
  loadAll();
});
</script>
</body>
</html>
