<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Orders - Admin | Batangas Premium Naga</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://kit.fontawesome.com/2771f4216a.js" crossorigin="anonymous"></script>
  <style>
    .sidebar-toggle{display:none;position:fixed;top:12px;left:12px;z-index:11000;width:44px;height:44px;border-radius:10px;background:#dc2626;border:none;color:white;font-size:18px;cursor:pointer;align-items:center;justify-content:center;box-shadow:0 4px 12px rgba(0,0,0,.2);}
    .sidebar-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9998;}
    .sidebar-backdrop.active{display:block;}
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px;}
    .modal-box{background:white;border-radius:var(--radius-lg);padding:28px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @media(max-width:768px){
      .sidebar-toggle{display:flex;}
      .admin-layout{display:block!important;}
      .admin-sidebar{position:fixed!important;left:-280px;top:0;height:100vh;z-index:9999;transition:left .25s ease;width:260px!important;overflow-y:auto;}
      .admin-sidebar.open{left:0;}
      .admin-content{padding:70px 14px 24px!important;}
      .stats-grid{grid-template-columns:repeat(2,1fr)!important;}
      .table-container{overflow-x:auto;-webkit-overflow-scrolling:touch;}
      .search-bar{flex-direction:column!important;}
      .search-bar input,.search-bar select{max-width:100%!important;width:100%!important;}
      .modal-overlay{align-items:flex-end!important;padding:0!important;}
      .modal-box{border-radius:16px 16px 0 0!important;max-width:100%!important;}
      h1{font-size:1.3rem!important;}
    }
  </style>
</head>
<body>

<button class="sidebar-toggle" onclick="toggleSidebar()"><i class="fas fa-bars"></i></button>
<div class="sidebar-backdrop" id="sidebarBackdrop" onclick="closeSidebar()"></div>

<div class="admin-layout">
  <aside class="admin-sidebar" id="adminSidebar">
    <div class="admin-sidebar-header">
      <a href="../index.html" class="logo" style="text-decoration:none;">
        <div class="logo-icon"><i class="fas fa-utensils"></i></div>
        <div>
          <div class="logo-text" style="color:white;">Batangas Premium Naga</div>
          <div class="logo-subtext" style="color:rgba(255,255,255,.7);">Admin Panel</div>
        </div>
      </a>
    </div>
    <nav class="admin-sidebar-nav">
      <a href="dashboard.html" class="admin-nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
      <a href="orders.html"    class="admin-nav-item active"><i class="fas fa-list-check"></i> Orders</a>
      <a href="products.html"  class="admin-nav-item"><i class="fas fa-box"></i> Products</a>
      <a href="categories.html" class="admin-nav-item"><i class="fas fa-tags"></i> Categories</a>
      <a href="customers.html" class="admin-nav-item"><i class="fas fa-users"></i> Customers</a>
      <a href="reports.html"   class="admin-nav-item"><i class="fas fa-chart-bar"></i> Reports</a>
      <a href="../index.html"  class="admin-nav-item" style="margin-top:auto;"><i class="fas fa-arrow-left"></i> Back to Site</a>
      <button onclick="Auth.logout()" class="admin-nav-item" style="background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;width:100%;text-align:left;"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    </nav>
  </aside>

  <main class="admin-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;flex-wrap:wrap;gap:12px;">
      <div>
        <h1 style="font-size:1.75rem;font-weight:700;margin-bottom:4px;">Orders</h1>
        <p style="color:var(--gray-500);font-size:14px;" id="order-count">Loading...</p>
      </div>
      <div style="display:flex;align-items:center;gap:8px;">
        <span style="font-size:12px;color:var(--gray-400);" id="last-refresh"></span>
        <button onclick="loadOrders()" class="btn btn-outline btn-sm"><i class="fas fa-rotate-right"></i></button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:20px;">
      <div class="stats-card"><div class="stats-header"><div><div class="stats-value" id="s-total" style="font-size:1.4rem;">0</div><div class="stats-label">Total</div></div><div class="stats-icon blue"><i class="fas fa-bag-shopping"></i></div></div></div>
      <div class="stats-card"><div class="stats-header"><div><div class="stats-value" id="s-pending" style="font-size:1.4rem;">0</div><div class="stats-label">Pending</div></div><div class="stats-icon orange"><i class="fas fa-clock"></i></div></div></div>
      <div class="stats-card"><div class="stats-header"><div><div class="stats-value" id="s-delivered" style="font-size:1.4rem;">0</div><div class="stats-label">Delivered</div></div><div class="stats-icon green"><i class="fas fa-check"></i></div></div></div>
      <div class="stats-card"><div class="stats-header"><div><div class="stats-value" id="s-revenue" style="font-size:1.1rem;color:#dc2626;">₱0</div><div class="stats-label">Revenue</div></div><div class="stats-icon red"><i class="fas fa-peso-sign"></i></div></div></div>
    </div>

    <!-- Search + filter -->
    <div class="search-bar" style="display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;">
      <input id="search-input" type="text" placeholder="Search order#, customer, email..." class="form-input" style="flex:1;min-width:180px;" oninput="filterOrders()">
      <select id="status-filter" class="form-select" style="max-width:160px;" onchange="filterOrders()">
        <option value="">All Status</option>
        <option value="Pending">Pending</option>
        <option value="Confirmed">Confirmed</option>
        <option value="Preparing">Preparing</option>
        <option value="Ready">Ready</option>
        <option value="Delivered">Delivered</option>
        <option value="Cancelled">Cancelled</option>
      </select>
    </div>

    <div class="table-container">
      <div id="loading" style="text-align:center;padding:48px;color:var(--gray-500);">
        <div style="width:28px;height:28px;border:3px solid #dc2626;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 10px;"></div>
        Loading orders...
      </div>
      <table class="table" id="orders-table" style="display:none;min-width:560px;">
        <thead>
          <tr><th>Order #</th><th>Customer</th><th>Type</th><th>Total</th><th>Status</th><th>Date</th><th>Actions</th></tr>
        </thead>
        <tbody id="orders-tbody"></tbody>
      </table>
      <div id="no-results" style="display:none;text-align:center;padding:48px;color:var(--gray-400);">No orders found.</div>
    </div>
  </main>
</div>

<!-- Order detail modal -->
<div id="detail-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:20px;">
      <h2 style="font-size:1.1rem;font-weight:700;margin:0;" id="modal-order-num">Order Details</h2>
      <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:var(--gray-400);">✕</button>
    </div>
    <div id="modal-content"></div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/app.js"></script>
<script>
function toggleSidebar(){document.getElementById('adminSidebar').classList.toggle('open');document.getElementById('sidebarBackdrop').classList.toggle('active');}
function closeSidebar(){document.getElementById('adminSidebar').classList.remove('open');document.getElementById('sidebarBackdrop').classList.remove('active');}
function closeModal(){document.getElementById('detail-modal').style.display='none';}

let allOrders=[];
const SC={Pending:'badge-warning',Confirmed:'badge-info',Preparing:'badge-info',Ready:'badge-success',Delivered:'badge-success',Cancelled:'badge-danger'};

async function loadOrders(){
  try{
    allOrders=await api.getAllOrders();
    const pending=allOrders.filter(o=>o.status==='Pending').length;
    const delivered=allOrders.filter(o=>o.status==='Delivered').length;
    const revenue=allOrders.filter(o=>o.status!=='Cancelled').reduce((s,o)=>s+parseFloat(o.total||0),0);
    document.getElementById('s-total').textContent=allOrders.length;
    document.getElementById('s-pending').textContent=pending;
    document.getElementById('s-delivered').textContent=delivered;
    document.getElementById('s-revenue').textContent='₱'+revenue.toFixed(2);
    document.getElementById('order-count').textContent=allOrders.length+' total orders';
    document.getElementById('last-refresh').textContent='Updated '+new Date().toLocaleTimeString();
    document.getElementById('loading').style.display='none';
    filterOrders();
  }catch(e){document.getElementById('loading').innerHTML='<p style="color:#dc2626;padding:20px;">Failed to load. Is the server running?</p>';}
}

function filterOrders(){
  const q=(document.getElementById('search-input').value||'').toLowerCase();
  const st=document.getElementById('status-filter').value;
  const filtered=allOrders.filter(o=>{
    const matchQ=!q||
      ('ORD-'+String(o.order_id).padStart(4,'0')).toLowerCase().includes(q)||
      (o.full_name||'').toLowerCase().includes(q)||
      (o.email||'').toLowerCase().includes(q)||
      (o.phone||'').toLowerCase().includes(q);
    const matchSt=!st||o.status===st;
    return matchQ&&matchSt;
  });
  renderTable(filtered);
}

function renderTable(orders){
  const table=document.getElementById('orders-table');
  const tbody=document.getElementById('orders-tbody');
  const noRes=document.getElementById('no-results');
  if(!orders.length){table.style.display='none';noRes.style.display='block';return;}
  noRes.style.display='none';table.style.display='table';
  tbody.innerHTML=orders.map(o=>{
    const id=o.order_id, date=o.created_at?new Date(o.created_at).toLocaleDateString('en-PH',{month:'short',day:'numeric'}):'-';
    return `<tr>
      <td style="font-weight:600;color:#dc2626;white-space:nowrap;">ORD-${String(id).padStart(4,'0')}</td>
      <td>
        <div style="font-weight:500;">${o.full_name||'—'}</div>
        <div style="font-size:12px;color:var(--gray-400);">${o.phone||''}</div>
      </td>
      <td><span style="font-size:12px;">${o.order_type||'—'}</span></td>
      <td style="font-weight:600;">₱${parseFloat(o.total||0).toFixed(2)}</td>
      <td><span class="badge ${SC[o.status]||'badge-info'}">${o.status||'Pending'}</span></td>
      <td style="font-size:12px;color:var(--gray-500);">${date}</td>
      <td>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-outline btn-sm" onclick="viewOrder(${id})" style="padding:4px 10px;">
            <i class="fas fa-eye"></i>
          </button>
          <select onchange="changeStatus(${id},this.value);this.value=''" class="form-select" style="font-size:12px;padding:4px 8px;max-width:110px;">
            <option value="">Update</option>
            <option value="Confirmed">Confirmed</option>
            <option value="Preparing">Preparing</option>
            <option value="Ready">Ready</option>
            <option value="Delivered">Delivered</option>
            <option value="Cancelled">Cancelled</option>
          </select>
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function changeStatus(id,status){
  if(!status)return;
  try{
    const res=await api.updateOrderStatus(id,status);
    if(res.success){
      // notify buyer
      try{await fetch(`http://localhost:3000/api/orders/${id}/notify`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({status})});}catch(e){}
      Utils.showToast('Status updated to '+status,'success');
      await loadOrders();
    }else{Utils.showToast(res.message||'Failed','error');}
  }catch{Utils.showToast('Server error','error');}
}

function viewOrder(id){
  const o=allOrders.find(x=>x.order_id===id);if(!o)return;
  document.getElementById('modal-order-num').textContent='ORD-'+String(id).padStart(4,'0');
  const items=(o.items||[]);
  document.getElementById('modal-content').innerHTML=`
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
      <div style="background:#f9fafb;padding:12px;border-radius:8px;"><p style="font-size:11px;color:#9ca3af;margin-bottom:3px;">CUSTOMER</p><p style="font-weight:600;">${o.full_name||'—'}</p><p style="font-size:13px;color:#6b7280;">${o.phone||''}</p><p style="font-size:13px;color:#6b7280;">${o.email||''}</p></div>
      <div style="background:#f9fafb;padding:12px;border-radius:8px;"><p style="font-size:11px;color:#9ca3af;margin-bottom:3px;">ORDER INFO</p><p style="font-weight:600;">${o.order_type||'—'}</p><p style="font-size:13px;color:#6b7280;">${o.payment_method||''}</p>${o.address?`<p style="font-size:12px;color:#6b7280;">${o.address}, ${o.city||''}</p>`:''}</div>
    </div>
    <div style="margin-bottom:16px;">
      <p style="font-size:11px;color:#9ca3af;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;">Items</p>
      ${items.map(i=>`<div style="display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f3f4f6;font-size:13px;">
        <span>${i.name} <span style="color:#9ca3af;">×${i.quantity}</span></span>
        <span style="font-weight:600;">₱${(parseFloat(i.price)*i.quantity).toFixed(2)}</span>
      </div>`).join('')}
      <div style="display:flex;justify-content:space-between;padding:10px 0;font-weight:700;font-size:15px;">
        <span>Total</span><span style="color:#dc2626;">₱${parseFloat(o.total||0).toFixed(2)}</span>
      </div>
    </div>
    <div>
      <p style="font-size:12px;font-weight:600;margin-bottom:8px;">Update Status:</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px;">
        ${['Confirmed','Preparing','Ready','Delivered','Cancelled'].map(s=>`
          <button onclick="changeStatus(${id},'${s}');closeModal();" class="btn btn-sm" style="background:${o.status===s?'#dc2626':'#f3f4f6'};color:${o.status===s?'white':'#374151'};border:1px solid ${o.status===s?'#dc2626':'#e5e7eb'};">${s}</button>
        `).join('')}
      </div>
    </div>`;
  document.getElementById('detail-modal').style.display='flex';
}

document.addEventListener('DOMContentLoaded',()=>{
  const user=JSON.parse(localStorage.getItem('currentUser')||'null');
  if(!user||(user.ROLE!=='admin'&&user.role!=='admin')){window.location.href='../login.html';return;}
  loadOrders();
  // Auto-refresh every 30 seconds
  setInterval(loadOrders,30000);
});
</script>
</body>
</html>
