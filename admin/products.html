<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products - Admin | Batangas Premium Naga</title>
  <link rel="stylesheet" href="../css/style.css">
  <script src="https://kit.fontawesome.com/2771f4216a.js" crossorigin="anonymous"></script>
  <style>
    .product-img-thumb { width:48px;height:48px;border-radius:8px;object-fit:cover;background:var(--gray-100); }
    .badge-instock { background:#dcfce7;color:#16a34a; }
    .badge-outstock { background:#fee2e2;color:#dc2626; }
    .modal-overlay { position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;padding:16px; }
    .modal-box { background:white;border-radius:var(--radius-lg);padding:32px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto; }
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div class="admin-layout">
  <aside class="admin-sidebar">
    <div class="admin-sidebar-header">
      <div class="logo-text" style="color:white;font-size:1rem;">Batangas Premium</div>
      <div style="font-size:12px;color:rgba(255,255,255,.6);margin-top:2px;">Admin Panel</div>
    </div>
    <nav class="admin-sidebar-nav">
      <a href="dashboard.html" class="admin-nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
      <a href="orders.html"    class="admin-nav-item"><i class="fas fa-list-check"></i> Orders</a>
      <a href="products.html"  class="admin-nav-item active"><i class="fas fa-box"></i> Products</a>
      <a href="categories.html" class="admin-nav-item"><i class="fas fa-tags"></i> Categories</a>
      <a href="customers.html" class="admin-nav-item"><i class="fas fa-users"></i> Customers</a>
      <a href="reports.html"   class="admin-nav-item"><i class="fas fa-chart-bar"></i> Reports</a>
      <a href="../index.html"  class="admin-nav-item"><i class="fas fa-arrow-left"></i> Back to Site</a>
      <button onclick="Auth.logout()" class="admin-nav-item" style="background:none;border:none;color:rgba(255,255,255,.8);cursor:pointer;width:100%;text-align:left;"><i class="fas fa-sign-out-alt"></i> Sign Out</button>
    </nav>
  </aside>

  <main class="admin-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:28px;flex-wrap:wrap;gap:12px;">
      <div>
        <h1 style="font-size:1.75rem;font-weight:700;margin-bottom:4px;">Products</h1>
        <p style="color:var(--gray-500);font-size:14px;" id="product-count">Loading...</p>
      </div>
      <button onclick="openModal()" class="btn btn-primary">
        <i class="fas fa-plus" style="margin-right:8px;"></i>Add Product
      </button>
    </div>

    <!-- Search + filter -->
    <div style="display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;">
      <input id="search-input" type="text" placeholder="Search products..." class="form-input" style="max-width:280px;"
        oninput="filterProducts()">
      <select id="cat-filter" class="form-select" style="max-width:200px;" onchange="filterProducts()">
        <option value="">All Categories</option>
      </select>
      <select id="stock-filter" class="form-select" style="max-width:160px;" onchange="filterProducts()">
        <option value="">All Stock</option>
        <option value="1">In Stock</option>
        <option value="0">Out of Stock</option>
      </select>
    </div>

    <div class="table-container">
      <div id="loading" style="text-align:center;padding:48px;color:var(--gray-500);">
        <div style="width:32px;height:32px;border:3px solid #dc2626;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px;"></div>
        Loading products...
      </div>
      <table class="table" id="products-table" style="display:none;">
        <thead>
          <tr>
            <th>Image</th>
            <th>Name</th>
            <th>Category</th>
            <th>Price</th>
            <th>Stock</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="products-tbody"></tbody>
      </table>
      <div id="no-results" style="display:none;text-align:center;padding:48px;color:var(--gray-500);">No products found.</div>
    </div>
  </main>
</div>

<!-- Modal -->
<div id="modal" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <h2 id="modal-title" class="modal-header">Add Product</h2>
    <form id="product-form">
      <input type="hidden" id="product-id">
      <div class="form-group">
        <label class="form-label">Product Name *</label>
        <input type="text" id="p-name" class="form-input" required>
      </div>
      <div class="form-group">
        <label class="form-label">Category *</label>
        <select id="p-category" class="form-select" required></select>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="p-desc" class="form-textarea" rows="3"></textarea>
      </div>
      <div class="grid grid-cols-2" style="gap:16px;">
        <div class="form-group">
          <label class="form-label">Price (₱) *</label>
          <input type="number" id="p-price" class="form-input" step="0.01" min="0" required>
        </div>
        <div class="form-group">
          <label class="form-label">Stock Status</label>
          <select id="p-stock" class="form-select">
            <option value="1">In Stock</option>
            <option value="0">Out of Stock</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Image URL</label>
        <input type="url" id="p-image" class="form-input" placeholder="https://...">
        <div id="img-preview" style="margin-top:8px;display:none;">
          <img id="img-preview-el" style="width:80px;height:80px;object-fit:cover;border-radius:8px;border:1px solid var(--gray-200);">
        </div>
      </div>
      <div class="modal-actions">
        <button type="submit" class="btn btn-primary" id="save-btn">Save Product</button>
        <button type="button" onclick="closeModal()" class="btn btn-outline">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- Delete confirm -->
<div id="delete-modal" class="modal-overlay" style="display:none;">
  <div class="modal-box" style="max-width:400px;">
    <h2 class="modal-header" style="color:#dc2626;"><i class="fas fa-triangle-exclamation" style="margin-right:8px;"></i>Delete Product</h2>
    <p style="color:var(--gray-600);margin-bottom:24px;">Are you sure you want to delete <strong id="delete-name"></strong>? This cannot be undone.</p>
    <div class="modal-actions">
      <button id="confirm-delete-btn" class="btn btn-primary" style="background:#dc2626;">Delete</button>
      <button onclick="closeDeleteModal()" class="btn btn-outline">Cancel</button>
    </div>
  </div>
</div>

<script src="../js/data.js"></script>
<script src="../js/api.js"></script>
<script src="../js/cart.js"></script>
<script src="../js/app.js"></script>
<script>
let allProducts = [];
let allCategories = [];
let deleteTargetId = null;

async function loadAll() {
  try {
    const [products, cats] = await Promise.all([api.getProducts(), api.getCategories_admin()]);
    allProducts = products;
    allCategories = cats;

    // Fill category filters
    const catFilter = document.getElementById('cat-filter');
    catFilter.innerHTML = '<option value="">All Categories</option>' +
      cats.map(c => `<option value="${c.CATEGORY_ID||c.category_id}">${c.NAME||c.name}</option>`).join('');

    document.getElementById('product-count').textContent = `${products.length} product${products.length!==1?'s':''}`;
    document.getElementById('loading').style.display = 'none';
    renderTable(products);
  } catch(e) {
    document.getElementById('loading').textContent = 'Failed to load. Is the server running?';
  }
}

function renderTable(products) {
  const table = document.getElementById('products-table');
  const tbody = document.getElementById('products-tbody');
  const noRes = document.getElementById('no-results');
  if (!products.length) { table.style.display='none'; noRes.style.display='block'; return; }
  noRes.style.display='none'; table.style.display='table';
  tbody.innerHTML = products.map(p => {
    const id = p.id || p.product_id;
    const inStock = p.in_stock == 1;
    return `<tr>
      <td><img src="${p.image||'https://via.placeholder.com/48'}" class="product-img-thumb" onerror="this.src='https://via.placeholder.com/48'"></td>
      <td><div style="font-weight:600;">${p.name}</div><div style="font-size:12px;color:var(--gray-500);">${p.description||''}</div></td>
      <td>${p.category||'—'}</td>
      <td style="font-weight:600;color:var(--primary-red);">₱${parseFloat(p.price).toFixed(2)}</td>
      <td><span class="badge ${inStock?'badge-instock':'badge-outstock'}">${inStock?'In Stock':'Out of Stock'}</span></td>
      <td>
        <div class="table-actions">
          <button class="icon-btn edit" onclick='editProduct(${JSON.stringify(p)})' title="Edit"><i class="fas fa-pen"></i></button>
          <button class="icon-btn delete" onclick="confirmDelete(${id},'${p.name.replace(/'/g,"\\'")}')" title="Delete"><i class="fas fa-trash"></i></button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

function filterProducts() {
  const q = document.getElementById('search-input').value.toLowerCase();
  const catId = document.getElementById('cat-filter').value;
  const stock = document.getElementById('stock-filter').value;
  let filtered = allProducts.filter(p => {
    const matchQ = !q || p.name.toLowerCase().includes(q) || (p.description||'').toLowerCase().includes(q);
    const matchCat = !catId; // filter by cat name since products have category name
    const matchStock = stock === '' || String(p.in_stock) === stock;
    return matchQ && matchStock;
  });
  if (catId) {
    const catName = allCategories.find(c=>(c.CATEGORY_ID||c.category_id)==catId)?.NAME || allCategories.find(c=>(c.CATEGORY_ID||c.category_id)==catId)?.name;
    if (catName) filtered = filtered.filter(p=>p.category===catName);
  }
  renderTable(filtered);
}

function openModal(data = null) {
  document.getElementById('modal-title').textContent = data ? 'Edit Product' : 'Add Product';
  document.getElementById('product-id').value = data ? (data.id||data.product_id) : '';
  document.getElementById('p-name').value = data?.name || '';
  document.getElementById('p-desc').value = data?.description || '';
  document.getElementById('p-price').value = data?.price || '';
  document.getElementById('p-stock').value = data?.in_stock !== undefined ? data.in_stock : '1';
  document.getElementById('p-image').value = data?.image || '';
  previewImage(data?.image || '');

  // Fill category dropdown
  const sel = document.getElementById('p-category');
  sel.innerHTML = allCategories.map(c => {
    const id = c.CATEGORY_ID || c.category_id;
    const name = c.NAME || c.name;
    const selected = data?.category === name ? 'selected' : '';
    return `<option value="${id}" ${selected}>${name}</option>`;
  }).join('');

  document.getElementById('modal').style.display = 'flex';
}

function editProduct(p) { openModal(p); }

function closeModal() { document.getElementById('modal').style.display = 'none'; }

function previewImage(url) {
  const wrap = document.getElementById('img-preview');
  const img  = document.getElementById('img-preview-el');
  if (url) { img.src = url; wrap.style.display = 'block'; }
  else { wrap.style.display = 'none'; }
}

document.getElementById('p-image').addEventListener('input', e => previewImage(e.target.value));

document.getElementById('product-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('save-btn');
  btn.textContent = 'Saving...'; btn.disabled = true;
  const id = document.getElementById('product-id').value;
  const data = {
    category_id: parseInt(document.getElementById('p-category').value),
    name:        document.getElementById('p-name').value,
    description: document.getElementById('p-desc').value,
    price:       parseFloat(document.getElementById('p-price').value),
    image_url:   document.getElementById('p-image').value || null,
    in_stock:    parseInt(document.getElementById('p-stock').value),
  };
  try {
    const result = id ? await api.updateProduct(id, data) : await api.addProduct(data);
    if (result.success || result.product_id) {
      closeModal(); await loadAll();
      Utils.showToast(id ? 'Product updated!' : 'Product added!', 'success');
    } else { Utils.showToast(result.message||'Failed to save','error'); }
  } catch { Utils.showToast('Server error','error'); }
  btn.textContent = 'Save Product'; btn.disabled = false;
});

function confirmDelete(id, name) {
  deleteTargetId = id;
  document.getElementById('delete-name').textContent = name;
  document.getElementById('delete-modal').style.display = 'flex';
}
function closeDeleteModal() { document.getElementById('delete-modal').style.display = 'none'; deleteTargetId = null; }

document.getElementById('confirm-delete-btn').addEventListener('click', async () => {
  if (!deleteTargetId) return;
  try {
    await api.deleteProduct(deleteTargetId);
    closeDeleteModal(); await loadAll();
    Utils.showToast('Product deleted', 'info');
  } catch { Utils.showToast('Failed to delete','error'); }
});

document.getElementById('modal').addEventListener('click', e => { if(e.target===document.getElementById('modal')) closeModal(); });

document.addEventListener('DOMContentLoaded', () => {
  const user = JSON.parse(localStorage.getItem('currentUser')||'null');
  if (!user || (user.ROLE!=='admin'&&user.role!=='admin')) { window.location.href=window.location.pathname.split('/admin/')[0]+'/login.html'; return; }
  loadAll();
});
</script>
</body>
</html>
