<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Products Management - Admin</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <div class="admin-layout">
    <!-- Admin Sidebar -->
    <aside class="admin-sidebar">
      <div class="admin-sidebar-header">
        <div class="logo">
          <div class="logo-icon">
            <i><!-- Logo icon --></i>
          </div>
          <div>
            <div class="logo-text" style="color: white;">Batangas Premium</div>
            <div class="logo-subtext" style="color: rgba(255,255,255,0.7);">Admin Panel</div>
          </div>
        </div>
      </div>

      <nav class="admin-sidebar-nav">
        <a href="dashboard.html" class="admin-nav-item">
          <i><!-- Dashboard icon --></i>
          <span>Dashboard</span>
        </a>
        <a href="products.html" class="admin-nav-item active">
          <i><!-- Package icon --></i>
          <span>Products</span>
        </a>
        <a href="orders.html" class="admin-nav-item">
          <i><!-- Shopping bag icon --></i>
          <span>Orders</span>
        </a>
        <a href="categories.html" class="admin-nav-item">
          <i><!-- Tag icon --></i>
          <span>Categories</span>
        </a>
        <a href="customers.html" class="admin-nav-item">
          <i><!-- Users icon --></i>
          <span>Customers</span>
        </a>
        <a href="reports.html" class="admin-nav-item">
          <i><!-- Bar chart icon --></i>
          <span>Reports</span>
        </a>
        <a href="../index.html" class="admin-nav-item" style="margin-top: auto; opacity: 0.8;">
          <i><!-- Home icon --></i>
          <span>Back to Website</span>
        </a>
        <a href="#" onclick="logout()" class="admin-nav-item" style="opacity: 0.8;">
          <i><!-- Logout icon --></i>
          <span>Logout</span>
        </a>
      </nav>
    </aside>

    <!-- Admin Content -->
    <main class="admin-content">
      <div class="flex justify-between items-center mb-8">
        <div>
          <h1 style="font-size: 2rem; margin-bottom: var(--space-2);">Products Management</h1>
          <p style="color: var(--gray-600);">Manage your product catalog</p>
        </div>
        <button onclick="openProductModal()" class="btn btn-primary">
          <i><!-- Plus icon --></i>
          Add New Product
        </button>
      </div>

      <!-- Products Table -->
      <div class="table-container">
        <table class="table">
          <thead>
            <tr>
              <th>Image</th>
              <th>Name</th>
              <th>Category</th>
              <th>Price</th>
              <th>Stock</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="products-table">
            <!-- Products loaded by JavaScript -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- Product Modal -->
  <div id="product-modal" class="modal-overlay hidden">
    <div class="modal">
      <h2 class="modal-header" id="modal-title">Add New Product</h2>
      <form id="product-form">
        <input type="hidden" id="product-id">
        
        <div class="form-group">
          <label class="form-label">Product Name *</label>
          <input type="text" id="product-name" class="form-input" required>
        </div>

        <div class="form-group">
          <label class="form-label">Description *</label>
          <textarea id="product-description" class="form-textarea" required></textarea>
        </div>

        <div class="grid grid-cols-2">
          <div class="form-group">
            <label class="form-label">Price (₱) *</label>
            <input type="number" id="product-price" class="form-input" step="0.01" required>
          </div>

          <div class="form-group">
            <label class="form-label">Stock *</label>
            <input type="number" id="product-stock" class="form-input" required>
          </div>
        </div>

        <div class="grid grid-cols-2">
          <div class="form-group">
            <label class="form-label">Category *</label>
            <select id="product-category" class="form-select" required>
              <!-- Categories loaded by JavaScript -->
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Status *</label>
            <select id="product-status" class="form-select" required>
              <option value="Available">Available</option>
              <option value="Unavailable">Unavailable</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Image URL</label>
          <input type="url" id="product-image" class="form-input" placeholder="https://example.com/image.jpg">
        </div>

        <div class="modal-actions">
          <button type="button" onclick="closeProductModal()" class="btn btn-outline">Cancel</button>
          <button type="submit" class="btn btn-primary">
            <i><!-- Save icon --></i>
            Save Product
          </button>
        </div>
      </form>
    </div>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/cart.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    // Check admin access
    if (!Auth.isAdmin()) {
      alert('Access denied. Admin only.');
      window.location.href = '../login.html';
    }

    let editingProductId = null;

    // Load products
    function loadProducts() {
      const products = DB.getProducts();
      const tbody = document.getElementById('products-table');

      if (products.length === 0) {
        tbody.innerHTML = '<tr><td colspan="7" class="text-center" style="padding: var(--space-8); color: var(--gray-500);">No products yet</td></tr>';
        return;
      }

      tbody.innerHTML = products.map(product => `
        <tr>
          <td>
            <img src="${product.image}" alt="${product.name}" style="width: 50px; height: 50px; object-fit: cover; border-radius: var(--radius-md);">
          </td>
          <td style="font-weight: 500;">${product.name}</td>
          <td><span class="badge badge-info">${product.category}</span></td>
          <td>${Utils.formatCurrency(product.price)}</td>
          <td>${product.stock}</td>
          <td>
            <span class="badge badge-${product.status === 'Available' ? 'success' : 'danger'}">
              ${product.status}
            </span>
          </td>
          <td>
            <div class="table-actions">
              <button onclick="editProduct('${product.id}')" class="icon-btn edit">
                <i><!-- Edit icon --></i>
              </button>
              <button onclick="deleteProduct('${product.id}')" class="icon-btn delete">
                <i><!-- Delete icon --></i>
              </button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // Load categories for dropdown
    function loadCategories() {
      const categories = DB.getCategories();
      const select = document.getElementById('product-category');
      select.innerHTML = categories.map(cat => 
        `<option value="${cat.name}">${cat.name}</option>`
      ).join('');
    }

    // Open product modal
    function openProductModal() {
      editingProductId = null;
      document.getElementById('modal-title').textContent = 'Add New Product';
      document.getElementById('product-form').reset();
      document.getElementById('product-modal').classList.remove('hidden');
      loadCategories();
    }

    // Close product modal
    function closeProductModal() {
      document.getElementById('product-modal').classList.add('hidden');
    }

    // Edit product
    function editProduct(id) {
      const product = DB.getProduct(id);
      if (!product) return;

      editingProductId = id;
      document.getElementById('modal-title').textContent = 'Edit Product';
      document.getElementById('product-id').value = product.id;
      document.getElementById('product-name').value = product.name;
      document.getElementById('product-description').value = product.description;
      document.getElementById('product-price').value = product.price;
      document.getElementById('product-stock').value = product.stock;
      document.getElementById('product-category').value = product.category;
      document.getElementById('product-status').value = product.status;
      document.getElementById('product-image').value = product.image;

      document.getElementById('product-modal').classList.remove('hidden');
      loadCategories();
    }

    // Delete product
    function deleteProduct(id) {
      if (confirm('Are you sure you want to delete this product?')) {
        DB.deleteProduct(id);
        Utils.showNotification('Product deleted successfully');
        loadProducts();
      }
    }

    // Save product
    document.getElementById('product-form').addEventListener('submit', (e) => {
      e.preventDefault();

      const productData = {
        name: document.getElementById('product-name').value,
        description: document.getElementById('product-description').value,
        price: parseFloat(document.getElementById('product-price').value),
        stock: parseInt(document.getElementById('product-stock').value),
        category: document.getElementById('product-category').value,
        status: document.getElementById('product-status').value,
        image: document.getElementById('product-image').value || 'https://via.placeholder.com/400'
      };

      if (editingProductId) {
        DB.updateProduct(editingProductId, productData);
        Utils.showNotification('Product updated successfully');
      } else {
        DB.addProduct(productData);
        Utils.showNotification('Product added successfully');
      }

      closeProductModal();
      loadProducts();
    });

    function logout() {
      if (confirm('Are you sure you want to logout?')) {
        Auth.logout();
      }
    }

    // Initial load
    loadProducts();
  </script>
</body>
</html>
